<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waterfall Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
</head>
<body class="light-mode">

    <button id="theme-toggle" aria-label="Toggle dark and light themes">Dark Mode</button>

    <!-- Top Left UI -->
    <main id="ui-layer">
        <div class="panel">
            <h1>Waterfall Sandbox</h1>
            <p id="currency-display">Water Drops: 0</p>
            
            <!-- NEW: Layer Controls -->
            <div id="layer-controls">
                <span>Layer: <span id="layer-display">5</span></span>
                <div class="layer-btns">
                    <button id="layer-down">-</button>
                    <button id="layer-up">+</button>
                </div>
            </div>
            <p class="hint-text">Objects are drawn on this layer. Water only hits rocks on the SAME layer!</p>
            
            <button id="clear-btn" style="margin-top: 15px; width: 100%; background: #e57373;">Clear All</button>
        </div>
    </main>

    <!-- Bottom Toolbar -->
    <div id="toolbar">
        <button class="tool-btn" data-tool="move">🖐️ Move</button>
        <button class="tool-btn active" data-tool="water">💧 Spout</button>
        <button class="tool-btn" data-tool="rock">🪨 Rock</button>
        <button class="tool-btn" data-tool="tree">🌲 Tree</button>
        <button class="tool-btn" data-tool="bush">🌿 Bush</button>
        <button class="tool-btn" data-tool="eraser">❌ Eraser</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
